<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSE事件测试</title>
    <style>
        body {
            font-family: 'Consolas', monospace;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        h1 {
            color: #4ec9b0;
        }
        .controls {
            margin-bottom: 20px;
        }
        input {
            padding: 8px;
            width: 400px;
            background: #2d2d2d;
            border: 1px solid #3e3e3e;
            color: #d4d4d4;
            font-family: 'Consolas', monospace;
        }
        button {
            padding: 8px 16px;
            background: #0e639c;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #1177bb;
        }
        .status {
            padding: 10px;
            margin-bottom: 20px;
            background: #2d2d2d;
            border-left: 4px solid #4ec9b0;
        }
        .events {
            background: #2d2d2d;
            padding: 15px;
            border: 1px solid #3e3e3e;
            max-height: 600px;
            overflow-y: auto;
        }
        .event {
            padding: 8px;
            margin-bottom: 5px;
            border-left: 3px solid #666;
        }
        .event.node_start {
            border-left-color: #4ec9b0;
            background: #1a3a2e;
        }
        .event.node_end {
            border-left-color: #ce9178;
            background: #3a2a1e;
        }
        .event.complete {
            border-left-color: #4ec9b0;
            background: #1e3a1e;
            font-weight: bold;
        }
        .event.error {
            border-left-color: #f48771;
            background: #3a1e1e;
        }
        .timestamp {
            color: #858585;
            font-size: 0.9em;
        }
        .event-type {
            color: #dcdcaa;
            font-weight: bold;
        }
        .step {
            color: #9cdcfe;
        }
        .message {
            color: #ce9178;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .stat {
            background: #2d2d2d;
            padding: 10px 20px;
            border: 1px solid #3e3e3e;
        }
        .stat-value {
            font-size: 24px;
            color: #4ec9b0;
        }
    </style>
</head>
<body>
    <h1>🔥 SSE事件实时测试</h1>

    <div class="controls">
        <input type="text" id="taskId" placeholder="输入 task_id 或留空使用最新任务">
        <button onclick="connect()">连接SSE</button>
        <button onclick="disconnect()">断开</button>
        <button onclick="clearEvents()">清空</button>
    </div>

    <div class="status" id="status">
        状态: 未连接
    </div>

    <div class="stats">
        <div class="stat">
            <div>总事件数</div>
            <div class="stat-value" id="totalCount">0</div>
        </div>
        <div class="stat">
            <div>node_start</div>
            <div class="stat-value" id="startCount">0</div>
        </div>
        <div class="stat">
            <div>node_end</div>
            <div class="stat-value" id="endCount">0</div>
        </div>
        <div class="stat">
            <div>延迟 (ms)</div>
            <div class="stat-value" id="latency">-</div>
        </div>
    </div>

    <div class="events" id="events"></div>

    <script>
        let eventSource = null;
        let eventCount = 0;
        let startCount = 0;
        let endCount = 0;
        let lastEventTime = Date.now();

        async function getLatestTaskId() {
            try {
                const response = await fetch('http://localhost:8000/api/documents/list?page=1&page_size=1');
                const data = await response.json();
                if (data.documents && data.documents.length > 0) {
                    return data.documents[0].task_id;
                }
            } catch (e) {
                console.error('获取最新任务失败:', e);
            }
            return null;
        }

        async function connect() {
            let taskId = document.getElementById('taskId').value.trim();

            if (!taskId) {
                taskId = await getLatestTaskId();
                if (!taskId) {
                    updateStatus('错误: 无法获取任务ID', 'error');
                    return;
                }
                document.getElementById('taskId').value = taskId;
            }

            disconnect();

            const url = `http://localhost:8000/api/documents/progress/${taskId}`;
            updateStatus(`正在连接: ${url}`, 'connecting');

            eventSource = new EventSource(url);

            eventSource.onopen = () => {
                updateStatus(`✓ 已连接: ${taskId}`, 'connected');
            };

            eventSource.addEventListener('node_start', (e) => {
                handleEvent('node_start', e);
            });

            eventSource.addEventListener('node_end', (e) => {
                handleEvent('node_end', e);
            });

            eventSource.addEventListener('complete', (e) => {
                handleEvent('complete', e);
            });

            eventSource.addEventListener('error', (e) => {
                handleEvent('error', e);
            });

            eventSource.onerror = (e) => {
                updateStatus('× 连接错误或已关闭', 'error');
            };
        }

        function disconnect() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
                updateStatus('已断开', 'disconnected');
            }
        }

        function handleEvent(type, event) {
            const now = Date.now();
            const latency = now - lastEventTime;
            lastEventTime = now;

            let data = {};
            try {
                data = JSON.parse(event.data);
            } catch (e) {
                data = { message: event.data };
            }

            eventCount++;
            if (type === 'node_start') startCount++;
            if (type === 'node_end') endCount++;

            document.getElementById('totalCount').textContent = eventCount;
            document.getElementById('startCount').textContent = startCount;
            document.getElementById('endCount').textContent = endCount;
            document.getElementById('latency').textContent = latency;

            const eventDiv = document.createElement('div');
            eventDiv.className = `event ${type}`;

            const timestamp = new Date().toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', fractionalSecondDigits: 3 });

            eventDiv.innerHTML = `
                <span class="timestamp">${timestamp}</span>
                <span class="event-type">${type}</span>
                <span class="step">${data.step || '-'}</span>
                <span class="message">${data.message || data.step_name || ''}</span>
                <span style="color: #608b4e">${data.progress || 0}%</span>
            `;

            const eventsContainer = document.getElementById('events');
            eventsContainer.insertBefore(eventDiv, eventsContainer.firstChild);
        }

        function updateStatus(text, status) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = '状态: ' + text;
        }

        function clearEvents() {
            document.getElementById('events').innerHTML = '';
            eventCount = 0;
            startCount = 0;
            endCount = 0;
            document.getElementById('totalCount').textContent = '0';
            document.getElementById('startCount').textContent = '0';
            document.getElementById('endCount').textContent = '0';
            document.getElementById('latency').textContent = '-';
        }

        // 自动连接
        window.onload = () => {
            connect();
        };
    </script>
</body>
</html>
