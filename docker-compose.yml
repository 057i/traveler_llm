version: '3.8'

services:
  # Neo4j 图数据库
  neo4j:
    image: neo4j:5.15.0
    container_name: travel_neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/your_password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - travel_network

  # Redis 缓存（可选）
  redis:
    image: redis:7-alpine
    container_name: travel_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - travel_network

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travel_backend
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=your_password
      - REDIS_HOST=redis
    depends_on:
      - neo4j
      - redis
    volumes:
      - ./backend:/app
    networks:
      - travel_network

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travel_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - travel_network

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:

networks:
  travel_network:
    driver: bridge
